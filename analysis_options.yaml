analyzer:
  plugins:
    - dart_code_metrics

dart_code_metrics:
  metrics:
    cyclomatic-complexity: 18 # الحد الأقصى للتعقيد المنطقي في الميثود
    number-of-parameters: 4   # الحد الأقصى للمعاملات في الدالة
    maximum-nesting-level: 5  # الحد الأقصى لتداخل الـ if/loops
  rules:
    - newline-before-return
    - no-boolean-literal-compare
    - prefer-trailing-comma
    - avoid-unnecessary-conditionals